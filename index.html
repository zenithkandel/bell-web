<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bell System Configuration</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --text: #2c3e50;
        --primary: #3498db;
        --secondary: #2ecc71;
        --danger: #e74c3c;
        --border: #dcdde1;
        --card-bg: #ffffff;
        --font-main: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      [data-theme="dark"] {
        --bg: #1a1a1d;
        --text: #f5f6fa;
        --primary: #54a0ff;
        --secondary: #2ed573;
        --danger: #ff6b81;
        --border: #2f3640;
        --card-bg: #222f3e;
      }
      body {
        font-family: var(--font-main);
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 20px;
        font-size: 16px;
        transition:
          background 0.3s,
          color 0.3s;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--card-bg);
        padding: 15px 25px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
        border: 1px solid var(--border);
      }
      .header-title {
        font-size: 24px;
        font-weight: bold;
        color: var(--primary);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .controls {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .controls button {
        padding: 8px 12px;
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        border-radius: 8px;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: 0.2s;
      }
      .controls button:hover {
        border-color: var(--primary);
      }
      .card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }
      h2 {
        color: var(--primary);
        margin-top: 0;
        margin-bottom: 15px;
        font-size: 20px;
        border-bottom: 2px solid var(--border);
        padding-bottom: 8px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      @media (max-width: 768px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .status-box {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--bg);
        padding: 12px 15px;
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .badge {
        padding: 5px 12px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 14px;
      }
      .badge.success {
        background: var(--secondary);
        color: #fff;
      }
      .badge.error {
        background: var(--danger);
        color: #fff;
      }

      input,
      select,
      button {
        font-size: 16px;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        color: var(--text);
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: var(--primary);
      }
      .btn-primary {
        background: var(--primary);
        color: white;
        border: none;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px;
        width: 100%;
        transition: 0.2s;
      }
      .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-danger {
        background: var(--danger);
        color: white;
        border: none;
        font-weight: bold;
        cursor: pointer;
        padding: 8px 12px;
        border-radius: 6px;
      }
      .btn-danger:hover {
        opacity: 0.9;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }
      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }
      th {
        background: var(--bg);
        font-weight: 600;
        color: var(--primary);
      }
      tbody tr:hover {
        background: var(--bg);
      }

      .icon {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      .add-form {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        background: var(--bg);
        padding: 15px;
        border-radius: 8px;
        border: 1px solid var(--border);
        margin-top: 15px;
      }
      .add-form > div {
        flex: 1;
        min-width: 150px;
      }
      .add-form input,
      .add-form select {
        width: 100%;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-title">
          <svg class="icon" viewBox="0 0 24 24">
            <path
              d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"
            />
          </svg>
          <span id="t-title">Bell System</span>
        </div>
        <div class="controls">
          <div class="badge" id="net-status">Checking...</div>
          <button onclick="toggleLang()" id="lang-btn">NEP</button>
          <button onclick="toggleTheme()" id="theme-btn">
            <svg id="theme-icon" class="icon" viewBox="0 0 24 24">
              <path
                id="theme-path"
                d="M12 21a9 9 0 0 1-6.36-15.36A9 9 0 0 0 21 12a9 9 0 0 1-9 9z"
              />
            </svg>
          </button>
        </div>
      </header>

      <div class="grid">
        <div class="card">
          <h2 id="t-statusHeading">System Status</h2>
          <div class="status-box">
            <div class="status-row">
              <strong id="t-stateLabel">State:</strong>
              <span id="sys-state" class="badge success">RUNNING</span>
            </div>
            <div class="status-row">
              <strong id="t-timeLabel">Device Time:</strong>
              <span
                id="sys-time"
                style="font-family: monospace; font-size: 1.1em"
                >--:--:--</span
              >
            </div>
            <button
              class="btn-primary"
              onclick="syncTime()"
              style="margin-top: 10px"
            >
              <svg class="icon" viewBox="0 0 24 24">
                <path
                  d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0 0 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 0 0 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"
                />
              </svg>
              <span id="t-syncBtn">Sync Time</span>
            </button>
          </div>
        </div>

        <div class="card">
          <h2 id="t-audioTest">Audio Test</h2>
          <div class="status-box">
            <div class="status-row">
              <select
                id="audio-select"
                style="
                  width: 100%;
                  border: none;
                  background: transparent;
                  padding: 0;
                "
              >
                <option value="">Loading audios...</option>
              </select>
            </div>
            <button
              class="btn-primary"
              onclick="testAudio()"
              style="margin-top: 10px"
            >
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z" />
              </svg>
              <span id="t-playBtn">Play Audio</span>
            </button>
          </div>
        </div>
      </div>

      <div class="card">
        <h2 id="t-scheduleHeading">Schedule Management</h2>
        <div style="overflow-x: auto">
          <table>
            <thead>
              <tr>
                <th id="t-thTime">Time</th>
                <th id="t-thDays">Days</th>
                <th id="t-thAudio">Audio File</th>
                <th id="t-thAction">Actions</th>
              </tr>
            </thead>
            <tbody id="schedule-body">
              <!-- rows -->
            </tbody>
          </table>
        </div>

        <form id="add-schedule-form" class="add-form">
          <div>
            <label
              id="t-lblTime"
              style="
                font-size: 14px;
                font-weight: bold;
                margin-bottom: 5px;
                display: block;
                color: var(--primary);
              "
              >Set Time</label
            >
            <input type="time" id="new-time" required />
          </div>
          <div>
            <label
              id="t-lblDays"
              style="
                font-size: 14px;
                font-weight: bold;
                margin-bottom: 5px;
                display: block;
                color: var(--primary);
              "
              >Select Days</label
            >
            <select id="new-days" required>
              <option value="MON-FRI" id="t-optMonFri">Mon-Fri</option>
              <option value="SUN-THU" id="t-optSunThu">Sun-Thu</option>
              <option value="ALL" id="t-optAll">Everyday</option>
            </select>
          </div>
          <div>
            <label
              id="t-lblAudio"
              style="
                font-size: 14px;
                font-weight: bold;
                margin-bottom: 5px;
                display: block;
                color: var(--primary);
              "
              >Select Audio</label
            >
            <select id="new-audio" required>
              <option value="bell.mp3">bell.mp3</option>
            </select>
          </div>
          <div style="display: flex; align-items: flex-end">
            <button type="submit" class="btn-primary" id="t-addBtn">
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
              </svg>
              Add Record
            </button>
          </div>
        </form>
      </div>
    </div>

    <script>
      const dict = {
        en: {
          title: "Bell System",
          statusHeading: "System Status",
          stateLabel: "Device State",
          timeLabel: "Current Time",
          syncBtn: "Sync Time",
          audioTest: "Audio Settings",
          playBtn: "Play Audio",
          scheduleHeading: "Schedule Management",
          thTime: "Time",
          thDays: "Days",
          thAudio: "Audio File",
          thAction: "Actions",
          optMonFri: "Mon-Fri (INTL)",
          optSunThu: "Sun-Thu (NEP)",
          optAll: "Everyday",
          addBtn: "Add Record",
          deleteBtn: "Delete",
          netOnline: "Online",
          netOffline: "Offline",
          lblTime: "Set Time",
          lblDays: "Select Days",
          lblAudio: "Select Audio",
        },
        ne: {
          title: "घण्टी प्रणाली",
          statusHeading: "प्रणाली अवस्था",
          stateLabel: "उपकरण अवस्था",
          timeLabel: "वर्तमान समय",
          syncBtn: "समय मिलाउनुहोस्",
          audioTest: "आवाज सेटिङ",
          playBtn: "बजाउनुहोस्",
          scheduleHeading: "समय तालिका व्यवस्थापन",
          thTime: "समय",
          thDays: "दिनहरू",
          thAudio: "आवाज फाइल",
          thAction: "सुविधाहरु",
          optMonFri: "सोम-शुक्र",
          optSunThu: "आइत-बिहि",
          optAll: "हरेक दिन",
          addBtn: "थप्नुहोस्",
          deleteBtn: "हटाउनुहोस्",
          netOnline: "अनलाइन",
          netOffline: "अफलाइन",
          lblTime: "समय छान्नुहोस्",
          lblDays: "दिन छान्नुहोस्",
          lblAudio: "आवाज छान्नुहोस्",
        },
      };

      const icons = {
        moon: "M12 21a9 9 0 0 1-6.36-15.36A9 9 0 0 0 21 12a9 9 0 0 1-9 9z",
        sun: "M12 7a5 5 0 1 0 5 5 5.006 5.006 0 0 0-5-5zm0 8a3 3 0 1 1 3-3 3.003 3.003 0 0 1-3 3zm9-4h-2a1 1 0 0 0 0 2h2a1 1 0 0 0 0-2zM5 11H3a1 1 0 0 0 0 2h2a1 1 0 0 0 0-2zm7-6V3a1 1 0 0 0-2 0v2a1 1 0 0 0 2 0zm0 14v2a1 1 0 0 0 2 0v-2a1 1 0 0 0-2 0zm5.66-10.74l1.41-1.41a1 1 0 0 0-1.41-1.41l-1.41 1.41a1 1 0 0 0 1.41 1.41zM6.34 16.26l-1.41 1.41a1 1 0 0 0 1.41 1.41l1.41-1.41a1 1 0 0 0-1.41-1.41zm11.32.01a1 1 0 0 0-1.41 1.41l1.41 1.41a1 1 0 0 0 1.41-1.41zm-11.32-9.9l-1.41-1.41a1 1 0 0 0-1.41 1.41l1.41 1.41a1 1 0 0 0 1.41-1.41z",
      };

      let lang = "en";
      let theme = "light";
      const API_BASE = "api.php?endpoint=";

      function toggleLang() {
        lang = lang === "en" ? "ne" : "en";
        document.getElementById("lang-btn").innerText =
          lang === "en" ? "NEP" : "ENG";
        updateTexts();
      }

      function toggleTheme() {
        theme = theme === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", theme);
        document
          .getElementById("theme-path")
          .setAttribute("d", theme === "dark" ? icons.sun : icons.moon);
      }

      function updateTexts() {
        const keys = Object.keys(dict[lang]);
        keys.forEach((k) => {
          const el = document.getElementById(`t-${k}`);
          if (el) {
            if (el.tagName === "INPUT" && el.type === "button")
              el.value = dict[lang][k];
            else el.innerText = dict[lang][k];
          }
        });
        updateNetworkStatus();
        renderSchedule();
      }

      function updateNetworkStatus() {
        const isOnline = navigator.onLine;
        const netEl = document.getElementById("net-status");
        if (isOnline) {
          netEl.innerText = dict[lang].netOnline;
          netEl.className = "badge success";
        } else {
          netEl.innerText = dict[lang].netOffline;
          netEl.className = "badge error";
        }
      }
      window.addEventListener("online", updateNetworkStatus);
      window.addEventListener("offline", updateNetworkStatus);

      let schedule = [
        { id: 1, time: "09:00", days: "MON-FRI", audio: "morning.mp3" },
        { id: 2, time: "16:00", days: "MON-FRI", audio: "evening.mp3" },
      ];
      let audios = [];

      async function fetchStatus() {
        try {
          const res = await fetch(API_BASE + "status");
          const data = await res.json();
          document.getElementById("sys-state").innerText = data.state;
          document.getElementById("sys-time").innerText = data.time;
        } catch (e) {
          console.warn("Failed to fetch status");
        }
      }

      async function fetchAudioList() {
        try {
          const res = await fetch(API_BASE + "audio_list");
          audios = await res.json();

          const optHtml = audios
            .map((a) => `<option value="${a}">${a}</option>`)
            .join("");
          document.getElementById("audio-select").innerHTML = optHtml;
          document.getElementById("new-audio").innerHTML = optHtml;
        } catch (e) {
          console.warn("Failed to fetch audio list");
        }
      }

      function renderSchedule() {
        const tbody = document.getElementById("schedule-body");
        tbody.innerHTML = schedule
          .map(
            (s) => `
                <tr>
                    <td style="font-family: monospace; font-size: 1.1em; font-weight: bold;">${s.time}</td>
                    <td>${s.days}</td>
                    <td>${s.audio}</td>
                    <td><button class="btn-danger" onclick="deleteSchedule(${s.id})">${dict[lang].deleteBtn}</button></td>
                </tr>
            `,
          )
          .join("");
      }

      async function syncTime() {
        let timestamp;
        // Timezone handle if online
        if (navigator.onLine) {
          // Get current time adjusted to GMT+5:45 (Kathmandu)
          const d = new Date();
          const localTime = d.getTime();
          const localOffset = d.getTimezoneOffset() * 60000;
          const utc = localTime + localOffset;
          const offsetNepal = 5.75 * 3600000; // 5 hours 45 minutes
          timestamp = Math.floor((utc + offsetNepal) / 1000);
        } else {
          timestamp = Math.floor(Date.now() / 1000);
        }

        try {
          await fetch(API_BASE + "sync_time", {
            method: "POST",
            body: JSON.stringify({ timestamp }),
          });
          alert("Time synced successfully.");
          fetchStatus();
        } catch (e) {
          alert("Sync failed. Check device connection.");
        }
      }

      async function testAudio() {
        const audio = document.getElementById("audio-select").value;
        if (!audio) return;
        alert("Sent play command: " + audio);
      }

      function deleteSchedule(id) {
        if (confirm("Confirm delete?")) {
          schedule = schedule.filter((s) => s.id !== id);
          renderSchedule();
        }
      }

      document
        .getElementById("add-schedule-form")
        .addEventListener("submit", (e) => {
          e.preventDefault();
          const time = document.getElementById("new-time").value;
          const days = document.getElementById("new-days").value;
          const audio = document.getElementById("new-audio").value;
          schedule.push({
            id: Date.now(),
            time,
            days,
            audio: audio || "bell.mp3",
          });

          // Sort by time
          schedule.sort((a, b) => a.time.localeCompare(b.time));
          renderSchedule();
        });

      // Initialize
      updateNetworkStatus();
      updateTexts();
      fetchStatus();
      fetchAudioList();
      renderSchedule();
      setInterval(fetchStatus, 5000);
    </script>
  </body>
</html>
